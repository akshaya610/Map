<!DOCTYPE html>
<html>
<head>
  <title>Test Map</title>
  <style>
    #map { height: 500px; width: 100%; }
  </style>
</head>
<body>

<h3>Map Test</h3>
<div id="map"></div>

<script>
function initMap() {
  new google.maps.Map(document.getElementById("map"), {
    center: { lat: 13.0827, lng: 80.2707 },
    zoom: 12
  });
}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCr2tCaCB7A6AQIUT_CAB1pM1qaV7bXLEQ&callback=initMap">
</script>

</body>
</html>
